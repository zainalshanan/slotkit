services:
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: slotkit
      POSTGRES_USER: slotkit
      POSTGRES_PASSWORD: slotkit
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slotkit"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
